<!doctype html>
<html lang="en">

@@include('html/head.html',{
  "title": "Sign up — GoTrip"
})
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <div class="__container">

    @@include('html/_header_grid.html')

    <main id="main">

      <section class="page-banner">
        <div class="decor decor--dots decor-1"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <svg aria-hidden="true" focusable="false" class="decor decor--wave decor-2" viewBox="0 0 90 39" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.6" d="M7 32 21.8 17.4c5.8-5.8 15.2-5.8 21 0l4.3 4.2c5.8 5.8 15.2 5.8 21 0L83 7" stroke="currentColor" stroke-width="13" stroke-linecap="round"/></svg>

        <h1 class="page-banner__title">Create Account</h1>
        <p class="page-banner__crumbs"><a href="index.html">Home</a> / <span>Sign up</span></p>
      </section>

      <section class="auth">
        <div class="auth__card" data-aos="fade-up">
          <h2 class="auth__title">Join GoTrip</h2>
          <p class="auth__subtitle">Create an account and start exploring.</p>

          <form action="#" method="POST" data-success="Sign-up isn't available yet — GoTrip is a demo project.">
            <div class="field">
              <label class="field__label" for="r-name">Full name</label>
              <input class="field__input" id="r-name" name="name" type="text" placeholder="Jane Doe" required>
            </div>
            <div class="field">
              <label class="field__label" for="r-email">Email</label>
              <input class="field__input" id="r-email" name="email" type="email" placeholder="jane@email.com" required>
            </div>
            <div class="field">
              <label class="field__label" for="r-password">Password</label>
              <input class="field__input" id="r-password" name="password" type="password" placeholder="At least 8 characters" required minlength="8">
            </div>

            <div class="auth__row">
              <label><input type="checkbox" name="terms" required> I agree to the <a href="terms.html">Terms</a></label>
            </div>

            <button class="btn btn--primary btn--block" type="submit">Create account</button>
          </form>

          <p class="auth__foot">Already have an account? <a href="login.html">Login</a></p>
        </div>
      </section>

    </main>

  </div>

  @@include('html/_footer.html')

  <script src="plugins/aos/dist/aos.min.js"></script>
  <script src="plugins/aos/js/aos_init.min.js"></script>
  <script src="js/app.min.js"></script>

</body>
</html>
