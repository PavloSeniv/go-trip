<!doctype html>
<html lang="en">

@@include('html/head.html',{
  "title": "Login — GoTrip"
})
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <div class="__container">

    @@include('html/_header_grid.html')

    <main id="main">

      <section class="page-banner">
        <div class="decor decor--dots decor-1"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <svg aria-hidden="true" focusable="false" class="decor decor--wave decor-2" viewBox="0 0 90 39" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.6" d="M7 32 21.8 17.4c5.8-5.8 15.2-5.8 21 0l4.3 4.2c5.8 5.8 15.2 5.8 21 0L83 7" stroke="currentColor" stroke-width="13" stroke-linecap="round"/></svg>

        <h1 class="page-banner__title">Welcome Back</h1>
        <p class="page-banner__crumbs"><a href="index.html">Home</a> / <span>Login</span></p>
      </section>

      <section class="auth">
        <div class="auth__card" data-aos="fade-up">
          <h2 class="auth__title">Login to your account</h2>
          <p class="auth__subtitle">Good to see you again, explorer.</p>

          <form action="#" method="POST" data-success="Login isn't available yet — GoTrip is a demo project.">
            <div class="field">
              <label class="field__label" for="l-email">Email</label>
              <input class="field__input" id="l-email" name="email" type="email" placeholder="jane@email.com" required>
            </div>
            <div class="field">
              <label class="field__label" for="l-password">Password</label>
              <input class="field__input" id="l-password" name="password" type="password" placeholder="••••••••" required>
            </div>

            <div class="auth__row">
              <label><input type="checkbox" name="remember"> Remember me</label>
              <a href="forgot.html">Forgot password?</a>
            </div>

            <button class="btn btn--primary btn--block" type="submit">Login</button>
          </form>

          <p class="auth__foot">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
      </section>

    </main>

  </div>

  @@include('html/_footer.html')

  <script src="plugins/aos/dist/aos.min.js"></script>
  <script src="plugins/aos/js/aos_init.min.js"></script>
  <script src="js/app.min.js"></script>

</body>
</html>
